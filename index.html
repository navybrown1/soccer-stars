<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soccer Stars Pro ⚽</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #050a12 0%, #0b1528 50%, #050a12 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  user-select: none;
}
#game-wrapper {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 100px rgba(0,255,100,0.15), 0 0 200px rgba(0,255,100,0.05);
  border: 4px solid rgba(255,255,255,0.05);
}
canvas {
  display: block;
}
#ui-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
}
#scoreboard {
  position: absolute;
  top: 16px; left: 50%;
  transform: translateX(-50%);
  background: rgba(10, 15, 30, 0.8);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 8px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  color: white;
  font-size: 14px;
  pointer-events: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.score-item { display: flex; align-items: center; gap: 10px; }
.badge {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800;
  border: 2px solid rgba(255,255,255,0.2);
}
.badge.you { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; box-shadow: 0 0 12px rgba(59,130,246,0.5); }
.badge.ai { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; box-shadow: 0 0 12px rgba(239,68,68,0.5); }
.score-num { font-size: 28px; font-weight: 900; letter-spacing: -1px; font-family: monospace; }
.score-divider { color: rgba(255,255,255,0.3); font-size: 24px; font-weight: 300; }
#timer {
  color: #fbbf24; font-weight: 800;
  font-variant-numeric: tabular-nums;
  min-width: 54px; text-align: center;
  background: rgba(251,191,36,0.15);
  padding: 4px 12px;
  border-radius: 8px;
  font-size: 16px;
  border: 1px solid rgba(251,191,36,0.2);
}
#power-meter-container {
  position: absolute;
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 12px;
  background: rgba(0,0,0,0.6);
  border-radius: 6px;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.15s;
  border: 1px solid rgba(255,255,255,0.15);
}
#power-meter-container.visible { opacity: 1; }
#power-meter-fill {
  height: 100%;
  width: 0%;
  border-radius: 6px;
  background: linear-gradient(90deg, #22c55e, #eab308, #ef4444);
}
#instructions {
  position: absolute;
  bottom: 48px; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.4);
  font-size: 12px;
  text-align: center;
  letter-spacing: 0.5px;
  pointer-events: none;
  text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  background: rgba(0,0,0,0.4);
  padding: 4px 16px;
  border-radius: 20px;
}
#instructions kbd {
  background: rgba(255,255,255,0.12);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
}
#overlay-screen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(5, 10, 20, 0.85);
  backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: auto;
  transition: opacity 0.4s;
  z-index: 10;
}
#overlay-screen.hidden { opacity: 0; pointer-events: none; }
#overlay-screen h1 {
  color: white;
  font-size: 52px;
  margin-bottom: 12px;
  text-shadow: 0 0 40px rgba(34,197,94,0.3);
  letter-spacing: -1.5px;
  font-weight: 900;
}
#overlay-screen .sub {
  color: rgba(255,255,255,0.6);
  font-size: 16px;
  margin-bottom: 32px;
  text-align: center;
  max-width: 400px;
  line-height: 1.5;
}
.menu-section {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 32px;
  width: 320px;
}
.menu-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
  font-size: 14px;
}
.menu-select {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  padding: 6px 12px;
  border-radius: 8px;
  outline: none;
  cursor: pointer;
  font-weight: 600;
}
.menu-select:hover {
  background: rgba(255,255,255,0.15);
}
#overlay-screen .btn {
  pointer-events: auto;
  padding: 16px 48px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 6px 24px rgba(34,197,94,0.4);
}
#overlay-screen .btn:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 32px rgba(34,197,94,0.6);
}
#combo-display {
  position: absolute;
  top: 72px; right: 20px;
  color: #fbbf24;
  font-size: 24px;
  font-weight: 900;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  text-shadow: 0 0 20px rgba(251,191,36,0.4);
  transform: scale(0.8);
}
#combo-display.visible { opacity: 1; transform: scale(1); }
#sound-toggle {
  position: absolute;
  top: 16px; right: 16px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  pointer-events: auto;
  font-size: 16px;
}
#sound-toggle:hover {
  background: rgba(255,255,255,0.1);
}
</style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="game" width="950" height="700"></canvas>

  <div id="ui-overlay">
    <div id="scoreboard">
      <div class="score-item">
        <div class="badge you" id="badge-you">Y</div>
        <span class="score-num" id="score-you">0</span>
      </div>
      <span class="score-divider">:</span>
      <div class="score-item">
        <span class="score-num" id="score-ai">0</span>
        <div class="badge ai" id="badge-ai">AI</div>
      </div>
      <span id="timer">2:00</span>
    </div>

    <div id="power-meter-container">
      <div id="power-meter-fill"></div>
    </div>

    <div id="combo-display">🔥 x<span id="combo-count">0</span></div>

    <div id="instructions">
      <kbd>W A S D</kbd> move &nbsp;·&nbsp; <kbd>Space</kbd> hold to charge &amp; release to kick &nbsp;·&nbsp; <kbd>E</kbd> chip shot &nbsp;·&nbsp; <kbd>Shift</kbd> sprint
    </div>

    <button id="sound-toggle" title="Toggle Sound">🔊</button>

    <div id="overlay-screen">
      <h1 id="menu-title">⚽ Soccer Stars Pro</h1>
      <div class="sub" id="menu-sub">Experience the ultimate 2D arcade soccer game with realistic physics, smart AI, chip shots, and power-ups!</div>
      
      <div class="menu-section">
        <div class="menu-row">
          <span>Your Team</span>
          <select class="menu-select" id="select-team-you">
            <option value="ARG">Argentina 🇦🇷</option>
            <option value="BRA">Brazil 🇧🇷</option>
            <option value="FRA" selected>France 🇫🇷</option>
            <option value="GER">Germany 🇩🇪</option>
            <option value="ENG">England 🇬🇧</option>
            <option value="USA">USA 🇺🇸</option>
          </select>
        </div>
        <div class="menu-row">
          <span>Opponent Team</span>
          <select class="menu-select" id="select-team-ai">
            <option value="ARG" selected>Argentina 🇦🇷</option>
            <option value="BRA">Brazil 🇧🇷</option>
            <option value="FRA">France 🇫🇷</option>
            <option value="GER">Germany 🇩🇪</option>
            <option value="ENG">England 🇬🇧</option>
            <option value="USA">USA 🇺🇸</option>
          </select>
        </div>
        <div class="menu-row">
          <span>Difficulty</span>
          <select class="menu-select" id="select-difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
            <option value="legend">Legend</option>
          </select>
        </div>
      </div>

      <button class="btn" id="btn-start">Play Match</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 950, H = 700;

// DOM elements
const scoreYouEl = document.getElementById('score-you');
const scoreAiEl = document.getElementById('score-ai');
const timerEl = document.getElementById('timer');
const powerMeter = document.getElementById('power-meter-container');
const powerFill = document.getElementById('power-meter-fill');
const overlay = document.getElementById('overlay-screen');
const btnStart = document.getElementById('btn-start');
const comboEl = document.getElementById('combo-display');
const comboCountEl = document.getElementById('combo-count');
const soundToggle = document.getElementById('sound-toggle');
const selectTeamYou = document.getElementById('select-team-you');
const selectTeamAi = document.getElementById('select-team-ai');
const selectDifficulty = document.getElementById('select-difficulty');
const badgeYou = document.getElementById('badge-you');
const badgeAi = document.getElementById('badge-ai');

// Team Colors & Configurations
const TEAMS = {
  ARG: { name: 'Argentina', primary: '#74acdf', secondary: '#ffffff', text: '#000000', badge: 'ARG' },
  BRA: { name: 'Brazil', primary: '#fde047', secondary: '#16a34a', text: '#002244', badge: 'BRA' },
  FRA: { name: 'France', primary: '#1d4ed8', secondary: '#ffffff', text: '#ffffff', badge: 'FRA' },
  GER: { name: 'Germany', primary: '#111827', secondary: '#eab308', text: '#ffffff', badge: 'GER' },
  ENG: { name: 'England', primary: '#ffffff', secondary: '#dc2626', text: '#000000', badge: 'ENG' },
  USA: { name: 'USA', primary: '#1e3a8a', secondary: '#ef4444', text: '#ffffff', badge: 'USA' }
};

// ─── Field Layout ──────────────────────────────────────────
const F = {
  l: 60, r: W - 60, t: 70, b: H - 70,
  cx: W / 2, cy: H / 2,
  gT: { l: W / 2 - 65, r: W / 2 + 65, y: 70 },
  gB: { l: W / 2 - 65, r: W / 2 + 65, y: H - 70 }
};

// ─── Sound System (Web Audio API) ──────────────────────────
let audioCtx = null;
let soundEnabled = true;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playSound(type) {
  if (!soundEnabled) return;
  initAudio();
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  try {
    const now = audioCtx.currentTime;
    if (type === 'kick') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
      osc.start(now);
      osc.stop(now + 0.15);
    } else if (type === 'chip') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(400, now + 0.2);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
      osc.start(now);
      osc.stop(now + 0.2);
    } else if (type === 'goal') {
      // Crowd Cheer (Noise)
      const bufferSize = audioCtx.sampleRate * 1.5;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(1000, now);
      filter.frequency.exponentialRampToValueAtTime(300, now + 1.5);

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);

      noise.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      noise.start(now);

      // Fanfare
      const notes = [261.63, 329.63, 392.00, 523.25];
      notes.forEach((freq, idx) => {
        const osc = audioCtx.createOscillator();
        const oscGain = audioCtx.createGain();
        osc.connect(oscGain);
        oscGain.connect(audioCtx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(freq, now + idx * 0.1);
        oscGain.gain.setValueAtTime(0.15, now + idx * 0.1);
        oscGain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.1 + 0.4);
        osc.start(now + idx * 0.1);
        osc.stop(now + idx * 0.1 + 0.4);
      });
    } else if (type === 'whistle') {
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc1.connect(gain);
      osc2.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(1000, now);
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(1030, now); // beat frequency

      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      
      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 0.4);
      osc2.stop(now + 0.4);
    } else if (type === 'powerup') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.linearRampToValueAtTime(600, now + 0.1);
      osc.frequency.linearRampToValueAtTime(900, now + 0.2);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
      osc.start(now);
      osc.stop(now + 0.25);
    } else if (type === 'bounce') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(120, now);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
      osc.start(now);
      osc.stop(now + 0.08);
    }
  } catch (e) {
    console.warn("Audio error:", e);
  }
}

soundToggle.addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
});

// ─── Game State ────────────────────────────────────────────
const S = {
  phase: 'menu',
  sYou: 0, sAi: 0,
  time: 120,
  half: 1,
  goalTimer: 0,
  goalBy: null,
  shake: 0,
  shakeI: 0,
  parts: [],
  powerups: [],
  netBulgeTop: 0,
  netBulgeBottom: 0,
  combo: 0,
  comboTimer: 0,
  difficulty: 'medium',
  teamYou: 'FRA',
  teamAi: 'ARG',
  crowdCheer: 0
};

// ─── Entities ─────────────────────────────────────────────
const ball = {
  x: W/2, y: H/2, z: 0,
  vx: 0, vy: 0, vz: 0,
  r: 8, trail: [], spin: 0,
  rotX: 0, rotY: 0
};

// Factory for outfield players
function makePlayer(x, y, team, isHuman, number) {
  return {
    x, y, vx: 0, vy: 0,
    r: 15, spd: 230, sprintSpd: 340,
    fx: 0, fy: team === 'you' ? -1 : 1,
    charge: 0, charging: false,
    sprinting: false, sprintMeter: 100,
    animFrame: 0, animTimer: 0,
    powerupTimer: 0, powerupType: null,
    team, isHuman, number,
    state: 'defend', stateTimer: 0,
    homeX: x, homeY: y
  };
}

// Player team: 1 human + 2 AI teammates (bottom half)
const you = makePlayer(W/2, H - 160, 'you', true, 7);
const youMates = [
  makePlayer(W/2 - 140, H - 200, 'you', false, 10),
  makePlayer(W/2 + 140, H - 200, 'you', false, 11)
];

// AI team: 3 AI defenders (top half)
const aiTeam = [
  makePlayer(W/2, 160, 'ai', false, 9),
  makePlayer(W/2 - 130, 220, 'ai', false, 8),
  makePlayer(W/2 + 130, 220, 'ai', false, 4)
];

// Goalies
const aiG = { x: W/2, y: F.gT.y + 28, r: 12, spd: 240, tx: W/2, team: 'ai' };
const youG = { x: W/2, y: F.gB.y - 28, r: 12, spd: 240, tx: W/2, team: 'you' };

// All outfield players combined for easy iteration
function allOutfield() { return [you, ...youMates, ...aiTeam]; }

// ─── Input ────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'ShiftLeft' || e.code === 'KeyE') e.preventDefault();
  
  // Chip shot trigger
  if (e.code === 'KeyE' && S.phase === 'playing' && !you.charging) {
    chipBall(you);
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Helpers ──────────────────────────────────────────────
const d = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const cl = (v, mn, mx) => Math.max(mn, Math.min(mx, v));
const lr = (a, b, t) => a + (b - a) * t;
const a2 = (f, t) => Math.atan2(t.y - f.y, t.x - f.x);
const rand = (mn, mx) => mn + Math.random() * (mx - mn);

// ─── Particles ────────────────────────────────────────────
function spawnGoalParticles(x, y) {
  for (let i = 0; i < 80; i++) {
    const a = rand(0, Math.PI * 2);
    const s = rand(100, 350);
    S.parts.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 1, decay: rand(0.2, 0.5),
      r: rand(2, 6),
      c: ['#22c55e','#fbbf24','#3b82f6','#ef4444','#fff','#a855f7'][~~(rand(0, 6))]
    });
  }
  // Confetti
  for (let i = 0; i < 40; i++) {
    const a = rand(0, Math.PI * 2);
    const s = rand(60, 220);
    S.parts.push({
      x: rand(F.l, F.r), y: rand(F.t, H / 2),
      vx: Math.cos(a) * s, vy: Math.sin(a) * s + 60,
      life: 1.8, decay: rand(0.15, 0.3),
      r: rand(3, 8),
      c: ['#fbbf24','#ef4444','#22c55e','#3b82f6','#a855f0','#ec4899'][~~(rand(0, 6))]
    });
  }
}

function spawnTouchParticles(x, y, color = 'rgba(255,255,255,0.6)', count = 6) {
  for (let i = 0; i < count; i++) {
    const a = rand(0, Math.PI * 2);
    const s = rand(40, 100);
    S.parts.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 0.5, decay: rand(1.2, 2.8),
      r: rand(1.5, 3.5),
      c: color
    });
  }
}

function spawnPowerupParticles(x, y, color) {
  for (let i = 0; i < 15; i++) {
    const a = rand(0, Math.PI * 2);
    const s = rand(20, 60);
    S.parts.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 0.8, decay: rand(1, 2),
      r: rand(2, 4),
      c: color
    });
  }
}

function updateParticles(dt) {
  for (let i = S.parts.length - 1; i >= 0; i--) {
    const p = S.parts[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 150 * dt; // gravity
    p.life -= p.decay * dt;
    if (p.life <= 0) S.parts.splice(i, 1);
  }
}

// ─── Power-ups ────────────────────────────────────────────
const POWERUP_TYPES = {
  speed: { color: '#3b82f6', label: '⚡' },
  freeze: { color: '#22d3ee', label: '❄️' },
  supershot: { color: '#f97316', label: '🔥' }
};

function spawnPowerup() {
  if (S.powerups.length >= 2) return;
  const types = Object.keys(POWERUP_TYPES);
  const type = types[~~(rand(0, types.length))];
  S.powerups.push({
    x: rand(F.l + 50, F.r - 50),
    y: rand(F.t + 100, F.b - 100),
    type,
    pulse: 0
  });
}

function updatePowerups(dt) {
  for (let i = S.powerups.length - 1; i >= 0; i--) {
    const p = S.powerups[i];
    p.pulse += dt * 5;
    
    // Check player collision
    if (d(you, p) < you.r + 15) {
      applyPowerup(you, p.type);
      S.powerups.splice(i, 1);
      continue;
    }
    // Check AI team collision (all AI outfield players)
    let aiHit = false;
    for (const ap of aiTeam) {
      if (d(ap, p) < ap.r + 15) {
        applyPowerup(ap, p.type);
        aiHit = true;
        break;
      }
    }
    if (aiHit) { S.powerups.splice(i, 1); }
  }
}

function applyPowerup(entity, type) {
  entity.powerupType = type;
  entity.powerupTimer = 6.0; // 6 seconds duration
  playSound('powerup');
  spawnPowerupParticles(entity.x, entity.y, POWERUP_TYPES[type].color);
}

// ─── Ball Physics (with 3D height & spin) ──────────────────
function updateBall(dt) {
  const friction = 2.4;
  ball.vx *= (1 - friction * dt);
  ball.vy *= (1 - friction * dt);
  
  // Magnus Effect (Spin curves the ball)
  if (Math.abs(ball.spin) > 5) {
    const speed = Math.hypot(ball.vx, ball.vy);
    if (speed > 50) {
      // Curve perpendicular to velocity
      const angle = Math.atan2(ball.vy, ball.vx) + Math.PI / 2;
      const curveForce = ball.spin * speed * 0.00015;
      ball.vx += Math.cos(angle) * curveForce * dt;
      ball.vy += Math.sin(angle) * curveForce * dt;
    }
    ball.spin *= (1 - 2.5 * dt);
  }

  if (Math.abs(ball.vx) < 2) ball.vx = 0;
  if (Math.abs(ball.vy) < 2) ball.vy = 0;

  // 3D Height Physics
  if (ball.z > 0 || ball.vz !== 0) {
    ball.vz -= 380 * dt; // gravity
    ball.z += ball.vz * dt;
    if (ball.z <= 0) {
      ball.z = 0;
      ball.vz = -ball.vz * 0.55; // bounce
      if (Math.abs(ball.vz) < 20) ball.vz = 0;
      playSound('bounce');
      spawnTouchParticles(ball.x, ball.y, 'rgba(255,255,255,0.4)', 4);
    }
  }

  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  // 3D Rotation simulation
  ball.rotX += ball.vx * dt * 0.1;
  ball.rotY += ball.vy * dt * 0.1;

  // Side walls
  if (ball.x - ball.r < F.l) {
    ball.x = F.l + ball.r; ball.vx = -ball.vx * 0.55; ball.spin *= -0.4;
    playSound('bounce');
  }
  if (ball.x + ball.r > F.r) {
    ball.x = F.r - ball.r; ball.vx = -ball.vx * 0.55; ball.spin *= -0.4;
    playSound('bounce');
  }

  // Top wall / goal
  if (ball.y - ball.r < F.t) {
    if (ball.x > F.gT.l && ball.x < F.gT.r) {
      if (ball.z < 35) { // Goal height limit
        goal('ai'); return;
      }
    }
    ball.y = F.t + ball.r; ball.vy = -ball.vy * 0.55;
    playSound('bounce');
  }

  // Bottom wall / goal
  if (ball.y + ball.r > F.b) {
    if (ball.x > F.gB.l && ball.x < F.gB.r) {
      if (ball.z < 35) {
        goal('you'); return;
      }
    }
    ball.y = F.b - ball.r; ball.vy = -ball.vy * 0.55;
    playSound('bounce');
  }

  // Net Bulge simulation
  if (S.phase === 'playing') {
    if (ball.y < F.t + 15 && ball.x > F.gT.l && ball.x < F.gT.r) {
      S.netBulgeTop = lr(S.netBulgeTop, (F.t - ball.y) * 1.5, 10 * dt);
    } else {
      S.netBulgeTop = lr(S.netBulgeTop, 0, 8 * dt);
    }
    if (ball.y > F.b - 15 && ball.x > F.gB.l && ball.x < F.gB.r) {
      S.netBulgeBottom = lr(S.netBulgeBottom, (ball.y - F.b) * 1.5, 10 * dt);
    } else {
      S.netBulgeBottom = lr(S.netBulgeBottom, 0, 8 * dt);
    }
  }

  // Trail
  ball.trail.push({ x: ball.x, y: ball.y, z: ball.z, life: 1 });
  if (ball.trail.length > 16) ball.trail.shift();
  for (let i = ball.trail.length - 1; i >= 0; i--) {
    ball.trail[i].life -= 3.8 * dt;
    if (ball.trail[i].life <= 0) ball.trail.splice(i, 1);
  }
}

// ─── Goal ─────────────────────────────────────────────────
function goal(by) {
  S.goalBy = by;
  S.goalTimer = 2.4;
  S.shake = 0.7;
  S.shakeI = 15;
  spawnGoalParticles(ball.x, ball.y);
  playSound('goal');

  if (by === 'you') {
    S.sYou++;
    scoreYouEl.textContent = S.sYou;
    S.combo++;
    comboEl.classList.add('visible');
    comboCountEl.textContent = S.combo;
    S.comboTimer = 4;
  } else {
    S.sAi++;
    scoreAiEl.textContent = S.sAi;
    S.combo = 0;
    comboEl.classList.remove('visible');
  }

  S.phase = 'goal';
}

function resetPos() {
  ball.x = W/2; ball.y = H/2; ball.z = 0; ball.vx = 0; ball.vy = 0; ball.vz = 0; ball.trail = []; ball.spin = 0;
  // Reset all outfield players to home positions
  for (const p of allOutfield()) {
    p.x = p.homeX; p.y = p.homeY; p.vx = 0; p.vy = 0;
    p.charge = 0; p.charging = false;
    p.powerupType = null; p.powerupTimer = 0;
    p.state = 'defend'; p.stateTimer = 0;
  }
  aiG.x = W/2; aiG.tx = W/2;
  youG.x = W/2; youG.tx = W/2;
  S.netBulgeTop = 0; S.netBulgeBottom = 0;
  S.powerups = [];
}

// ─── Player Controls ──────────────────────────────────────
function updateYou(dt) {
  let dx = 0, dy = 0;
  if (keys['KeyW'] || keys['ArrowUp']) dy = -1;
  if (keys['KeyS'] || keys['ArrowDown']) dy = 1;
  if (keys['KeyA'] || keys['ArrowLeft']) dx = -1;
  if (keys['KeyD'] || keys['ArrowRight']) dx = 1;

  if (dx !== 0 || dy !== 0) {
    const len = Math.hypot(dx, dy);
    dx /= len; dy /= len;
    you.fx = dx; you.fy = dy;
    you.animTimer += dt;
    if (you.animTimer > 0.1) { you.animFrame = (you.animFrame + 1) % 4; you.animTimer = 0; }
  } else {
    you.animFrame = 0;
  }

  // Power-up timers
  if (you.powerupTimer > 0) {
    you.powerupTimer -= dt;
    if (you.powerupTimer <= 0) you.powerupType = null;
  }

  const sprinting = keys['ShiftLeft'] || keys['ShiftRight'];
  let currentSpd = you.spd;
  if (you.powerupType === 'speed') currentSpd *= 1.4;
  
  const spd = sprinting && you.sprintMeter > 0 ? you.sprintSpd : currentSpd;
  if (sprinting && you.sprintMeter > 0) you.sprintMeter = Math.max(0, you.sprintMeter - 35 * dt);
  else you.sprintMeter = Math.min(100, you.sprintMeter + 18 * dt);

  you.vx = dx * spd;
  you.vy = dy * spd;
  you.x += you.vx * dt;
  you.y += you.vy * dt;
  you.x = cl(you.x, F.l + you.r, F.r - you.r);
  you.y = cl(you.y, F.t + 80, F.b - you.r);

  // Kick charging
  if (keys['Space'] && !you.charging) { you.charging = true; you.charge = 0; }
  if (you.charging) {
    if (keys['Space']) {
      you.charge = Math.min(you.charge + dt * 2.0, 1);
      powerMeter.classList.add('visible');
      powerFill.style.width = (you.charge * 100) + '%';
    } else {
      if (you.charge > 0.05) {
        let sp = 220 + you.charge * 520;
        if (you.powerupType === 'supershot') sp *= 1.35;
        
        ball.vx = you.fx * sp + (Math.random() - 0.5) * 20;
        ball.vy = you.fy * sp + (Math.random() - 0.5) * 20;
        ball.spin = (Math.random() - 0.5) * 300;
        playSound('kick');
        S.shake = 0.2; S.shakeI = 4;
        spawnTouchParticles(ball.x, ball.y, you.powerupType === 'supershot' ? '#f97316' : '#fff', 10);
      }
      you.charging = false;
      you.charge = 0;
      powerMeter.classList.remove('visible');
    }
  }

  // Dribble & Collision
  const distToBall = d(you, ball);
  if (distToBall < you.r + ball.r + 4 && ball.z < 20) {
    const ang = a2(you, ball);
    ball.vx += Math.cos(ang) * 120 * dt;
    ball.vy += Math.sin(ang) * 120 * dt;
    if (distToBall < you.r + ball.r + 2) {
      if (Math.abs(you.vx) > 10 || Math.abs(you.vy) > 10) {
        ball.vx += you.fx * 70 * dt;
        ball.vy += you.fy * 70 * dt;
      }
    }
  }
}

function chipBall(kicker) {
  const distToBall = d(kicker, ball);
  if (distToBall < kicker.r + ball.r + 15 && ball.z < 15) {
    const sp = 240;
    ball.vx = kicker.fx * sp;
    ball.vy = kicker.fy * sp;
    ball.vz = 180; // Upward velocity
    ball.spin = (Math.random() - 0.5) * 100;
    playSound('chip');
    spawnTouchParticles(ball.x, ball.y, '#38bdf8', 8);
  }
}

// ─── AI Defender (State Machine) ───────────────────────────
// Generic AI for any non-human outfield player (teammates & opponents)
function updateAIPlayer(p, dt) {
  // Power-up timers
  if (p.powerupTimer > 0) {
    p.powerupTimer -= dt;
    if (p.powerupTimer <= 0) p.powerupType = null;
  }

  // Freeze: AI team frozen when player has freeze powerup
  if (p.team === 'ai' && you.powerupType === 'freeze') {
    p.vx = 0; p.vy = 0;
    return;
  }

  const distToBall = d(p, ball);
  let tx, ty;

  // AI State Machine
  p.stateTimer -= dt;
  if (p.stateTimer <= 0) {
    const ballInOwnHalf = (p.team === 'ai' && ball.y < H / 2) || (p.team === 'you' && ball.y > H / 2);
    if (ballInOwnHalf) {
      p.state = distToBall < 180 ? 'dribble' : 'chase';
    } else {
      p.state = 'support';
    }
    p.stateTimer = rand(0.5, 1.5);
  }

  // Difficulty multipliers (only affect AI opponents, not teammates)
  let diffMultiplier = 1.0;
  if (p.team === 'ai') {
    if (S.difficulty === 'easy') diffMultiplier = 0.75;
    if (S.difficulty === 'hard') diffMultiplier = 1.15;
    if (S.difficulty === 'legend') diffMultiplier = 1.3;
  } else {
    diffMultiplier = 0.95; // teammates slightly slower than human
  }

  let currentSpd = p.spd * diffMultiplier;
  if (p.powerupType === 'speed') currentSpd *= 1.4;

  // Target goal: AI attacks bottom, your team attacks top
  const attackGoalY = p.team === 'ai' ? F.b : F.t;
  const ownGoalY = p.team === 'ai' ? F.t : F.b;
  const ownHalfMin = p.team === 'ai' ? F.t : H / 2;
  const ownHalfMax = p.team === 'ai' ? H / 2 : F.b;

  if (p.state === 'chase') {
    tx = ball.x;
    ty = ball.y;
  } else if (p.state === 'dribble') {
    tx = ball.x;
    ty = ball.y;
  } else {
    // Support: spread out, stay between ball and attack goal
    tx = ball.x + (p.homeX - W / 2) * 0.5;
    ty = (p.homeY + ownGoalY) / 2;
  }

  // Jitter based on difficulty
  const jitterAmount = p.team === 'ai'
    ? (S.difficulty === 'easy' ? 40 : (S.difficulty === 'medium' ? 20 : 5))
    : 25;
  const jitter = Math.sin(Date.now() / 800 + p.x) * jitterAmount;
  tx += jitter;

  const ang = Math.atan2(ty - p.y, tx - p.x);
  p.vx = Math.cos(ang) * currentSpd;
  p.vy = Math.sin(ang) * currentSpd;
  p.x += p.vx * dt;
  p.y += p.vy * dt;
  p.x = cl(p.x, F.l + p.r, F.r - p.r);
  // AI opponents stay in top half, teammates stay in bottom half
  p.y = cl(p.y, ownHalfMin + p.r, ownHalfMax - p.r);
  p.fx = Math.cos(ang);
  p.fy = Math.sin(ang);

  // Kick ball
  if (distToBall < p.r + ball.r + 6 && ball.z < 20) {
    const power = 0.4 + Math.random() * 0.6;
    let targetAngle;

    // Smart shooting: aim for corners of the attack goal
    const attackGoalL = p.team === 'ai' ? F.gB.l : F.gT.l;
    const attackGoalR = p.team === 'ai' ? F.gB.r : F.gT.r;
    const ballNearAttackGoal = p.team === 'ai' ? ball.y > H / 2 + 100 : ball.y < H / 2 - 100;

    if (ballNearAttackGoal) {
      const targetX = Math.random() > 0.5 ? attackGoalL + 15 : attackGoalR - 15;
      targetAngle = Math.atan2(attackGoalY - p.y, targetX - p.x);
    } else {
      targetAngle = Math.atan2(attackGoalY - p.y, (ball.x - p.x) * 0.5 + (Math.random() - 0.5) * 100);
    }

    let sp = 200 + power * 400;
    if (p.powerupType === 'supershot') sp *= 1.35;

    ball.vx = Math.cos(targetAngle) * sp;
    ball.vy = Math.sin(targetAngle) * sp;
    ball.spin = (Math.random() - 0.5) * 200;
    playSound('kick');
    spawnTouchParticles(ball.x, ball.y, p.powerupType === 'supershot' ? '#f97316' : '#fff', 8);
  }
}

function updateAI(dt) {
  for (const p of youMates) updateAIPlayer(p, dt);
  for (const p of aiTeam) updateAIPlayer(p, dt);
}

// ─── Goalies ──────────────────────────────────────────────
function updateGoalies(dt) {
  // AI Goalie (Top)
  const gtx = cl(ball.x, F.gT.l + 22, F.gT.r - 22);
  aiG.tx = lr(aiG.tx, gtx, 3.5 * dt);
  aiG.x = lr(aiG.x, aiG.tx, 6 * dt);
  aiG.y = F.gT.y + 22;

  const dg = d(aiG, ball);
  if (dg < aiG.r + ball.r + 6 && ball.vy < 0 && ball.z < 25) {
    ball.vx += (ball.x - aiG.x) * 3;
    ball.vy = Math.abs(ball.vy) * 0.35 + 80;
    playSound('bounce');
    spawnTouchParticles(ball.x, ball.y, '#fbbf24', 6);
  }

  // Player Goalie (Bottom)
  const btx = cl(ball.x, F.gB.l + 22, F.gB.r - 22);
  youG.tx = lr(youG.tx, btx, 3.5 * dt);
  youG.x = lr(youG.x, youG.tx, 6 * dt);
  youG.y = F.gB.y - 28;

  const dyg = d(youG, ball);
  if (dyg < youG.r + ball.r + 6 && ball.vy > 0 && ball.z < 25) {
    ball.vx += (ball.x - youG.x) * 3;
    ball.vy = -Math.abs(ball.vy) * 0.35 - 80;
    playSound('bounce');
    spawnTouchParticles(ball.x, ball.y, '#fbbf24', 6);
  }
}

// ─── Drawing ──────────────────────────────────────────────
function drawField() {
  // Grass gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#14532d');
  grad.addColorStop(0.5, '#166534');
  grad.addColorStop(1, '#14532d');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Grass stripes
  for (let i = 0; i < 14; i++) {
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.015)' : 'rgba(0,0,0,0.015)';
    ctx.fillRect(F.l, F.t + i * ((F.b - F.t) / 14), F.r - F.l, (F.b - F.t) / 14);
  }

  // Stadium Border & Crowd
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, W, F.t);
  ctx.fillRect(0, F.b, W, H - F.b);
  ctx.fillRect(0, 0, F.l, H);
  ctx.fillRect(F.r, 0, W - F.r, H);

  // Animated Crowd (Spectators)
  ctx.fillStyle = '#334155';
  for (let x = 30; x < W; x += 24) {
    // Top crowd
    const topBob = Math.sin(Date.now() / 200 + x) * 2;
    ctx.beginPath();
    ctx.arc(x, F.t - 15 + topBob, 4, 0, Math.PI * 2);
    ctx.fillStyle = ['#ef4444','#3b82f6','#eab308','#a855f7','#10b981'][~~((x * 7) % 5)];
    ctx.fill();
    
    // Bottom crowd
    const botBob = Math.cos(Date.now() / 200 + x) * 2;
    ctx.beginPath();
    ctx.arc(x, F.b + 15 + botBob, 4, 0, Math.PI * 2);
    ctx.fillStyle = ['#ef4444','#3b82f6','#eab308','#a855f7','#10b981'][~~((x * 3) % 5)];
    ctx.fill();
  }

  // Field border glow
  ctx.shadowColor = 'rgba(255,255,255,0.08)';
  ctx.shadowBlur = 12;
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 3;
  ctx.strokeRect(F.l, F.t, F.r - F.l, F.b - F.t);
  ctx.shadowBlur = 0;

  // Center line
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(F.l, F.cy);
  ctx.lineTo(F.r, F.cy);
  ctx.stroke();

  // Center circle
  ctx.beginPath();
  ctx.arc(F.cx, F.cy, 60, 0, Math.PI * 2);
  ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(F.cx, F.cy, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();

  // Penalty areas
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2;
  ctx.strokeRect(F.gT.l - 85, F.t, 280, 75);
  ctx.strokeRect(F.gB.l - 85, F.b - 75, 280, 75);

  // Goal areas (6-yard box)
  ctx.strokeRect(F.gT.l - 40, F.t, 190, 35);
  ctx.strokeRect(F.gB.l - 40, F.b - 35, 190, 35);

  // Goals & Net Bulge
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 4;
  
  // Top Goal (AI)
  ctx.beginPath();
  ctx.moveTo(F.gT.l, F.t);
  ctx.lineTo(F.gT.l, F.t - 15 - S.netBulgeTop);
  ctx.lineTo(F.gT.r, F.t - 15 - S.netBulgeTop);
  ctx.lineTo(F.gT.r, F.t);
  ctx.stroke();

  // Top Goal Net Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 13; i++) {
    const x = F.gT.l + i * 10;
    ctx.beginPath();
    ctx.moveTo(x, F.t);
    const bulgeFactor = 1 - Math.abs(x - F.cx) / 65;
    const currentBulge = Math.max(0, S.netBulgeTop * bulgeFactor);
    ctx.lineTo(x, F.t - 15 - currentBulge);
    ctx.stroke();
  }
  for (let j = 1; j <= 3; j++) {
    ctx.beginPath();
    ctx.moveTo(F.gT.l, F.t - j * 4);
    ctx.quadraticCurveTo(F.cx, F.t - j * 4 - S.netBulgeTop, F.gT.r, F.t - j * 4);
    ctx.stroke();
  }

  // Bottom Goal (Player)
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(F.gB.l, F.b);
  ctx.lineTo(F.gB.l, F.b + 15 + S.netBulgeBottom);
  ctx.lineTo(F.gB.r, F.b + 15 + S.netBulgeBottom);
  ctx.lineTo(F.gB.r, F.b);
  ctx.stroke();

  // Bottom Goal Net Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 13; i++) {
    const x = F.gB.l + i * 10;
    ctx.beginPath();
    ctx.moveTo(x, F.b);
    const bulgeFactor = 1 - Math.abs(x - F.cx) / 65;
    const currentBulge = Math.max(0, S.netBulgeBottom * bulgeFactor);
    ctx.lineTo(x, F.b + 15 + currentBulge);
    ctx.stroke();
  }
  for (let j = 1; j <= 3; j++) {
    ctx.beginPath();
    ctx.moveTo(F.gB.l, F.b + j * 4);
    ctx.quadraticCurveTo(F.cx, F.b + j * 4 + S.netBulgeBottom, F.gB.r, F.b + j * 4);
    ctx.stroke();
  }

  // Corner arcs
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 2;
  const corners = [
    [F.l, F.t], [F.r, F.t], [F.l, F.b], [F.r, F.b]
  ];
  for (const [cx, cy] of corners) {
    ctx.beginPath();
    const sx = cx === F.l ? 1 : -1;
    const sy = cy === F.t ? 1 : -1;
    ctx.arc(cx, cy, 10, 0, Math.PI / 2 * (sx === 1 ? (sy === 1 ? 0 : 3) : (sy === 1 ? 1 : 2)), sx === 1 ? (sy === 1 ? 0 : 1) : (sy === 1 ? 1 : 0));
    ctx.stroke();
  }
}

function drawPlayer(p, dt) {
  const isHumanTeam = p.team === 'you';
  const team = TEAMS[isHumanTeam ? S.teamYou : S.teamAi];

  // Shadow
  ctx.beginPath();
  ctx.ellipse(p.x + 2, p.y + 6, p.r, p.r * 0.45, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fill();

  // Running animation bob
  const bob = p.isHuman && (Math.abs(p.vx) > 10 || Math.abs(p.vy) > 10)
    ? Math.sin(p.animFrame * Math.PI / 2) * 2.5 : 0;

  // Frozen effect (AI team only, when human has freeze powerup)
  const frozen = !isHumanTeam && you.powerupType === 'freeze';
  if (frozen) {
    ctx.shadowColor = '#22d3ee';
    ctx.shadowBlur = 15;
  } else {
    ctx.shadowColor = team.primary;
    ctx.shadowBlur = 10;
  }

  // Body
  ctx.beginPath();
  ctx.arc(p.x, p.y + bob, p.r, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(p.x - 3, p.y - 3 + bob, 0, p.x, p.y + bob, p.r);
  
  if (frozen) {
    grad.addColorStop(0, '#99f6e4');
    grad.addColorStop(1, '#0891b2');
  } else {
    grad.addColorStop(0, team.secondary);
    grad.addColorStop(1, team.primary);
  }
  
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Outline
  ctx.strokeStyle = team.primary;
  ctx.lineWidth = 1.8;
  ctx.stroke();

  // Jersey stripes
  ctx.strokeStyle = team.secondary;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(p.x - p.r * 0.6, p.y + bob - p.r * 0.3);
  ctx.lineTo(p.x + p.r * 0.6, p.y + bob - p.r * 0.3);
  ctx.stroke();

  // Number
  ctx.fillStyle = team.text;
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(p.number, p.x, p.y + 1 + bob);

  // Direction arrow
  const len = p.r + 6;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y + bob);
  ctx.lineTo(p.x + p.fx * len, p.y + p.fy * len + bob);
  ctx.strokeStyle = isHumanTeam ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Power-up Ring
  if (p.powerupType) {
    ctx.strokeStyle = POWERUP_TYPES[p.powerupType].color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(p.x, p.y + bob, p.r + 4 + Math.sin(Date.now() / 100) * 2, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawGoalie(g, isHuman) {
  const team = TEAMS[isHuman ? S.teamYou : S.teamAi];

  // Shadow
  ctx.beginPath();
  ctx.ellipse(g.x + 2, g.y + 5, g.r, g.r * 0.4, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fill();

  // Body
  ctx.beginPath();
  ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
  ctx.fillStyle = team.primary;
  ctx.fill();
  ctx.strokeStyle = team.secondary;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Gloves
  ctx.fillStyle = '#fbbf24';
  ctx.shadowColor = 'rgba(251,191,36,0.4)';
  ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(g.x - 6, g.y - 4, 4.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(g.x + 6, g.y - 4, 4.5, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBall() {
  // Trail
  for (const t of ball.trail) {
    ctx.beginPath();
    ctx.arc(t.x, t.y - t.z, ball.r * t.life * (1 + t.z * 0.01), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${t.life * 0.25})`;
    ctx.fill();
  }

  // 3D Shadow (scales down and fades as ball goes higher)
  const shadowScale = cl(1 - ball.z * 0.005, 0.2, 1);
  ctx.beginPath();
  ctx.ellipse(ball.x + 1 + ball.z * 0.1, ball.y + 5 + ball.z * 0.1, ball.r * shadowScale, ball.r * 0.5 * shadowScale, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(0,0,0,${0.25 * shadowScale})`;
  ctx.fill();

  // Glow when moving fast
  const speed = Math.hypot(ball.vx, ball.vy);
  if (speed > 200) {
    ctx.shadowColor = you.powerupType === 'supershot' ? '#f97316' : 'rgba(255,255,255,0.3)';
    ctx.shadowBlur = Math.min(25, speed / 15);
  }

  // Ball Body (scales up with height)
  const renderR = ball.r * (1 + ball.z * 0.008);
  ctx.beginPath();
  ctx.arc(ball.x, ball.y - ball.z, renderR, 0, Math.PI * 2);
  
  const bg = ctx.createRadialGradient(ball.x - 2, ball.y - 2 - ball.z, 0, ball.x, ball.y - ball.z, renderR);
  bg.addColorStop(0, '#ffffff');
  bg.addColorStop(0.7, '#f3f4f6');
  bg.addColorStop(1, '#9ca3af');
  ctx.fillStyle = bg;
  ctx.fill();
  ctx.strokeStyle = '#4b5563';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Rotating Pentagon Pattern simulation
  ctx.fillStyle = '#1f2937';
  const px = ball.x;
  const py = ball.y - ball.z;
  
  // Draw rotating pentagons based on rotX and rotY
  const pentagons = [
    { dx: -2, dy: -2 },
    { dx: 3, dy: 2 },
    { dx: -3, dy: 3 },
    { dx: 3, dy: -3 }
  ];
  
  pentagons.forEach(p => {
    // Apply rotation
    const rx = p.dx * Math.cos(ball.rotX) - p.dy * Math.sin(ball.rotY);
    const ry = p.dx * Math.sin(ball.rotX) + p.dy * Math.cos(ball.rotY);
    
    if (Math.hypot(rx, ry) < ball.r - 1) {
      ctx.beginPath();
      ctx.arc(px + rx, py + ry, 1.8 * (1 + ball.z * 0.008), 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

function drawPowerups() {
  for (const p of S.powerups) {
    const size = 12 + Math.sin(p.pulse) * 3;
    
    // Glow
    ctx.shadowColor = POWERUP_TYPES[p.type].color;
    ctx.shadowBlur = 15;
    
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
    ctx.fill();
    ctx.strokeStyle = POWERUP_TYPES[p.type].color;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Label
    ctx.fillStyle = '#ffffff';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(POWERUP_TYPES[p.type].label, p.x, p.y);
  }
}

function drawParticles() {
  for (const p of S.parts) {
    ctx.globalAlpha = cl(p.life, 0, 1);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.c;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawKickIndicator() {
  if (you.charging && you.charge > 0.05) {
    const len = 25 + you.charge * 60;
    const ang = Math.atan2(you.fy, you.fx);

    // Power line
    ctx.beginPath();
    ctx.moveTo(you.x, you.y);
    ctx.lineTo(you.x + you.fx * len, you.y + you.fy * len);
    ctx.strokeStyle = `rgba(255,255,255,${0.4 + you.charge * 0.5})`;
    ctx.lineWidth = 2.5 + you.charge * 4.5;
    ctx.stroke();

    // Arrowhead
    ctx.beginPath();
    ctx.moveTo(you.x + you.fx * len, you.y + you.fy * len);
    ctx.lineTo(you.x + you.fx * (len - 12) + Math.cos(ang + 0.5) * 8, you.y + you.fy * (len - 12) + Math.sin(ang + 0.5) * 8);
    ctx.lineTo(you.x + you.fx * (len - 12) + Math.cos(ang - 0.5) * 8, you.y + you.fy * (len - 12) + Math.sin(ang - 0.5) * 8);
    ctx.closePath();
    ctx.fillStyle = `rgba(255,255,255,${0.6 + you.charge * 0.4})`;
    ctx.fill();
  }
}

function drawGoalText() {
  if (S.phase === 'goal' && S.goalTimer > 0) {
    const alpha = cl(S.goalTimer * 2, 0, 1);
    const scale = 1 + (1 - alpha) * 0.5;
    ctx.save();
    ctx.translate(W / 2, H / 2 - 60);
    ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;

    // Text shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.font = 'black 64px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('⚽ GOAL!', 3, 3);

    // Text
    ctx.fillStyle = S.goalBy === 'you' ? '#22c55e' : '#ef4444';
    ctx.shadowColor = S.goalBy === 'you' ? 'rgba(34,197,94,0.5)' : 'rgba(239,68,68,0.5)';
    ctx.shadowBlur = 25;
    ctx.fillText('⚽ GOAL!', 0, 0);
    ctx.shadowBlur = 0;

    ctx.restore();
  }
}

function drawSprintMeter() {
  if (you.sprintMeter < 100) {
    const x = 20, y = H - 35, w = 90, h = 8;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.roundRect ? ctx.roundRect(x, y, w, h, 4) : ctx.fillRect(x, y, w, h);
    ctx.fill();

    const pct = you.sprintMeter / 100;
    ctx.fillStyle = pct > 0.3 ? '#3b82f6' : '#ef4444';
    ctx.fillRect(x + 1, y + 1, (w - 2) * pct, h - 2);

    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText('SPRINT', x, y - 2);
  }
}

// ─── Game Loop ────────────────────────────────────────────
let lastTime = 0;
let powerupSpawnTimer = 5.0;

function loop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  if (S.phase === 'playing') {
    S.time -= dt;
    
    // Power-up Spawning
    powerupSpawnTimer -= dt;
    if (powerupSpawnTimer <= 0) {
      spawnPowerup();
      powerupSpawnTimer = rand(8, 15);
    }

    if (S.time <= 0) {
      S.time = 0;
      playSound('whistle');
      if (S.half === 1) {
        S.half = 2;
        S.time = 120;
        resetPos();
        overlay.classList.remove('hidden');
        overlay.querySelector('h1').textContent = '⚽ Second Half';
        overlay.querySelector('.sub').textContent = `${S.sYou} - ${S.sAi}`;
        overlay.querySelector('.btn').textContent = 'Continue';
        S.phase = 'halftime';
        return;
      } else {
        S.phase = 'fulltime';
        overlay.classList.remove('hidden');
        if (S.sYou > S.sAi) {
          overlay.querySelector('h1').textContent = '🏆 You Win!';
          overlay.querySelector('.sub').textContent = `Final Score: ${S.sYou} - ${S.sAi}`;
        } else if (S.sAi > S.sYou) {
          overlay.querySelector('h1').textContent = '😢 AI Wins';
          overlay.querySelector('.sub').textContent = `Final Score: ${S.sYou} - ${S.sAi}`;
        } else {
          overlay.querySelector('h1').textContent = '🤝 Draw!';
          overlay.querySelector('.sub').textContent = `${S.sYou} - ${S.sAi} · Golden Goal!`;
        }
        overlay.querySelector('.btn').textContent = 'Play Again';
        return;
      }
    }

    updateYou(dt);
    updateAI(dt);
    updateGoalies(dt);
    updateBall(dt);
    updatePowerups(dt);
    updateParticles(dt);

    // Combo timer
    if (S.combo > 0) {
      S.comboTimer -= dt;
      if (S.comboTimer <= 0) {
        S.combo = 0;
        comboEl.classList.remove('visible');
      }
    }

    if (S.shake > 0) { S.shake -= dt; S.shakeI *= (1 - dt * 2); }

    const m = Math.floor(S.time / 60);
    const s = Math.floor(S.time % 60);
    timerEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;
  }

  if (S.phase === 'goal') {
    S.goalTimer -= dt;
    updateParticles(dt);
    if (S.shake > 0) { S.shake -= dt; S.shakeI *= (1 - dt * 2); }
    if (S.goalTimer <= 0) { resetPos(); S.phase = 'playing'; }
  }

  // ─── Render ──────────────────────────────────────────
  ctx.save();

  if (S.shake > 0) {
    ctx.translate((Math.random() - 0.5) * S.shakeI * 2, (Math.random() - 0.5) * S.shakeI * 2);
  }

  drawField();
  drawPowerups();
  drawGoalie(aiG, false);
  drawGoalie(youG, true);
  for (const p of allOutfield()) drawPlayer(p, dt);
  drawBall();
  drawKickIndicator();
  drawParticles();
  drawGoalText();
  drawSprintMeter();

  ctx.restore();

  requestAnimationFrame(loop);
}

// ─── Start ────────────────────────────────────────────────
function startGame() {
  // Read menu selections
  S.teamYou = selectTeamYou.value;
  S.teamAi = selectTeamAi.value;
  S.difficulty = selectDifficulty.value;

  // Update badges
  badgeYou.textContent = S.teamYou;
  badgeAi.textContent = S.teamAi;
  badgeYou.className = `badge you ${S.teamYou}`;
  badgeAi.className = `badge ai ${S.teamAi}`;

  // Apply colors to badges
  badgeYou.style.background = `linear-gradient(135deg, ${TEAMS[S.teamYou].primary}, ${TEAMS[S.teamYou].secondary})`;
  badgeYou.style.color = TEAMS[S.teamYou].text;
  badgeAi.style.background = `linear-gradient(135deg, ${TEAMS[S.teamAi].primary}, ${TEAMS[S.teamAi].secondary})`;
  badgeAi.style.color = TEAMS[S.teamAi].text;

  S.phase = 'playing';
  S.sYou = 0; S.sAi = 0;
  S.half = 1; S.time = 120;
  S.parts = []; S.stars = [];
  S.combo = 0; S.comboTimer = 0;
  comboEl.classList.remove('visible');
  scoreYouEl.textContent = '0'; scoreAiEl.textContent = '0';
  timerEl.textContent = '2:00';
  resetPos();
  overlay.classList.add('hidden');
  playSound('whistle');
}

btnStart.addEventListener('click', startGame);

requestAnimationFrame(loop);
</script>
